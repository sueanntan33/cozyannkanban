<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cozy Ann Kanban Board</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #fdf4f9;
    --surface:    #ffffff;
    --surface2:   #fff7fc;
    --surface3:   #fce9f5;
    --border:     #f0d6ea;
    --text:       #5c3d52;
    --text-muted: #b899ac;
    --accent:     #f0a6c8;
    --accent-dk:  #d97faa;
    --danger:     #f4a7a7;
    --danger-dk:  #d97070;
    --radius:     18px;
    --radius-sm:  12px;
    --radius-xs:  8px;
    --shadow:     0 4px 20px rgba(200,130,175,0.13);
    --shadow-lg:  0 8px 40px rgba(200,130,175,0.22);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: auto;
    background-image:
      radial-gradient(circle at 12% 18%, #fce4f388 0%, transparent 38%),
      radial-gradient(circle at 88% 82%, #e4eeff88 0%, transparent 38%),
      radial-gradient(circle at 55% 48%, #fdf0fa 0%, #fdf4f9 100%);
  }

  ::-webkit-scrollbar { width: 7px; height: 7px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* ══ Header ══ */
  header {
    padding: 12px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid var(--border);
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(14px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 11px;
  }

  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #f9c6e0, #c9b4f7);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.15rem;
    box-shadow: 0 3px 12px rgba(200,130,175,0.3);
    animation: floatie 3.5s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes floatie {
    0%,100% { transform: translateY(0) rotate(-2deg); }
    50% { transform: translateY(-4px) rotate(2deg); }
  }

  .logo-text { display: flex; flex-direction: column; line-height: 1.1; }
  .logo-name {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700; font-size: 1.12rem; color: var(--text);
  }
  .logo-sub  {
    font-size: 0.65rem; font-weight: 600; color: var(--text-muted);
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  .header-actions { display: flex; gap: 8px; align-items: center; }

  /* ══ Buttons ══ */
  .btn {
    font-family: 'Nunito', sans-serif;
    font-size: 0.83rem; font-weight: 700;
    padding: 8px 18px;
    border-radius: 50px;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all 0.18s ease;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .btn:hover { background: var(--surface3); border-color: var(--accent); transform: translateY(-1px); box-shadow: var(--shadow); }

  .btn.primary {
    background: linear-gradient(135deg, #f9c6e0, #d4b0f5);
    color: #5c3d52; border-color: transparent;
    box-shadow: 0 3px 14px rgba(200,130,175,0.3);
  }
  .btn.primary:hover { filter: brightness(1.06); box-shadow: 0 5px 20px rgba(200,130,175,0.4); }

  .btn.danger { background: #fff0f0; color: var(--danger-dk); border-color: #f9cece; }
  .btn.danger:hover { background: var(--danger-dk); color: #fff; border-color: var(--danger-dk); }

  .btn.ghost { background: transparent; border-color: transparent; color: var(--text-muted); }
  .btn.ghost:hover { background: var(--surface3); color: var(--text); border-color: var(--border); }

  .btn.sm { padding: 5px 13px; font-size: 0.76rem; }

  /* ══ Board ══ */
  .board-wrap {
    padding: 22px 22px 80px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
    min-height: calc(100vh - 68px);
  }

  /* ══ Column ══ */
  .column {
    flex: 0 0 292px;
    background: rgba(255,255,255,0.72);
    border-radius: var(--radius);
    border: 2px solid var(--border);
    overflow: hidden;
    transition: box-shadow 0.2s, border-color 0.2s;
    backdrop-filter: blur(10px);
  }
  .column.drag-over {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(240,166,200,0.22);
  }

  .col-header {
    padding: 13px 14px 11px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 2px solid var(--border);
    position: relative;
  }
  .col-header::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 4px;
    background: var(--col-accent, #f0a6c8);
    border-radius: 16px 16px 0 0;
  }

  .col-name-row { display: flex; align-items: center; gap: 7px; min-width: 0; flex: 1; }
  .col-emoji { font-size: 1rem; flex-shrink: 0; }

  .col-name-input {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700; font-size: 0.84rem;
    letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--col-accent, #d97faa);
    background: transparent; border: none; outline: none;
    cursor: pointer; width: 100%; padding: 0;
  }
  .col-name-input:focus {
    background: rgba(255,255,255,0.8);
    padding: 2px 7px; border-radius: 6px; cursor: text;
  }

  .col-count {
    font-size: 0.69rem; font-weight: 700;
    background: white; color: var(--col-accent, #d97faa);
    padding: 2px 8px; border-radius: 20px;
    border: 1.5px solid var(--border); flex-shrink: 0;
  }

  .col-del-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); padding: 3px 6px;
    border-radius: 8px; transition: all 0.15s; font-size: 0.84rem;
    flex-shrink: 0; margin-left: 4px;
  }
  .col-del-btn:hover { background: #fce9f5; color: var(--danger-dk); }

  .col-body {
    padding: 11px;
    min-height: 80px;
    display: flex; flex-direction: column; gap: 10px;
  }

  .col-footer { padding: 6px 11px 12px; }

  .add-card-btn {
    width: 100%; padding: 9px 12px;
    background: transparent;
    border: 2px dashed var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-family: 'Nunito', sans-serif; font-size: 0.82rem; font-weight: 700;
    cursor: pointer; transition: all 0.18s;
    display: flex; align-items: center; gap: 6px; justify-content: center;
  }
  .add-card-btn:hover {
    border-color: var(--col-accent, #d97faa);
    color: var(--col-accent, #d97faa);
    background: rgba(255,255,255,0.6);
  }

  /* ══ Card ══ */
  .card {
    background: #ffffff;
    border-radius: var(--radius-sm);
    border: 2px solid var(--border);
    padding: 13px;
    cursor: grab;
    transition: all 0.18s ease;
    position: relative; overflow: hidden;
    animation: cardIn 0.28s cubic-bezier(0.34,1.4,0.64,1);
  }
  @keyframes cardIn {
    from { opacity:0; transform: translateY(10px) scale(0.96); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }
  .card:hover { border-color: var(--accent); box-shadow: var(--shadow); transform: translateY(-2px); }
  .card.dragging { opacity: 0.42; cursor: grabbing; transform: rotate(1.5deg) scale(0.96); }

  .card-img {
    width: 100%; height: 122px; object-fit: cover;
    border-radius: 9px; margin-bottom: 10px; display: block;
    border: 1.5px solid var(--border);
  }

  .card-priority {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 0.67rem; font-weight: 800;
    letter-spacing: 0.07em; text-transform: uppercase;
    padding: 3px 9px; border-radius: 20px; margin-bottom: 7px;
  }

  .card-title {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700; font-size: 0.92rem; line-height: 1.35;
    margin-bottom: 6px; color: var(--text);
  }

  .card-note {
    font-size: 0.76rem; color: var(--text-muted); line-height: 1.55;
    margin-bottom: 9px;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }

  /* Dates */
  .card-dates { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 9px; }
  .card-date-pill {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 0.68rem; font-weight: 700;
    padding: 3px 9px; border-radius: 20px; letter-spacing: 0.02em;
  }
  .card-date-pill.start { background: #e8f7f0; color: #5a9a6a; border: 1.5px solid #c2e0cc; }
  .card-date-pill.due   { background: #fff0f5; color: #c0607a; border: 1.5px solid #f9cede; }
  .card-date-pill.overdue { background: #fff0f0; color: #c04040; border-color: #f9c0c0; }

  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 8px; padding-top: 8px;
    border-top: 1.5px solid var(--border);
  }

  .card-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .tag {
    font-size: 0.67rem; font-weight: 700;
    padding: 2px 8px; border-radius: 20px; letter-spacing: 0.03em;
  }

  .card-actions { display: flex; gap: 3px; opacity: 0; transition: opacity 0.15s; }
  .card:hover .card-actions { opacity: 1; }

  .card-action-btn {
    background: var(--surface3); border: none; color: var(--text-muted);
    padding: 5px 7px; border-radius: 8px;
    cursor: pointer; font-size: 0.74rem; transition: all 0.15s;
  }
  .card-action-btn:hover { background: var(--border); color: var(--text); }
  .card-action-btn.del:hover { background: var(--danger-dk); color: #fff; }

  /* ══ Add Column btn ══ */
  .add-col-btn {
    flex: 0 0 238px; height: 54px;
    background: rgba(255,255,255,0.55);
    border: 2px dashed var(--border); border-radius: var(--radius);
    color: var(--text-muted);
    font-family: 'Nunito', sans-serif; font-size: 0.85rem; font-weight: 700;
    cursor: pointer; transition: all 0.18s;
    display: flex; align-items: center; justify-content: center; gap: 7px;
  }
  .add-col-btn:hover { border-color: var(--accent); color: var(--accent-dk); background: rgba(255,255,255,0.85); box-shadow: var(--shadow); }

  /* Drop placeholder */
  .drop-ph {
    height: 68px; border: 2px dashed #f0a6c8; border-radius: var(--radius-sm);
    background: rgba(240,166,200,0.08);
    animation: phPulse 1.1s ease-in-out infinite;
  }
  @keyframes phPulse {
    0%,100% { background: rgba(240,166,200,0.08); }
    50% { background: rgba(240,166,200,0.18); }
  }

  /* ══ Overlay / Modal ══ */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(92,61,82,0.32); z-index: 200;
    align-items: center; justify-content: center;
    backdrop-filter: blur(6px); padding: 20px;
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 2px solid var(--border); border-radius: 22px;
    width: 100%; max-width: 520px; max-height: 92vh; overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: modalIn 0.25s cubic-bezier(0.34,1.45,0.64,1);
  }
  @keyframes modalIn {
    from { opacity:0; transform: scale(0.88) translateY(22px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    padding: 18px 22px 14px;
    border-bottom: 2px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(135deg, #fff5fb, #f5f0ff);
    border-radius: 20px 20px 0 0;
  }
  .modal-title {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700; font-size: 1.05rem; color: var(--text);
    display: flex; align-items: center; gap: 7px;
  }
  .modal-close {
    background: var(--surface3); border: none; color: var(--text-muted);
    font-size: 0.9rem; cursor: pointer;
    border-radius: 50%; transition: all 0.15s; line-height: 1;
    width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: var(--border); color: var(--text); }

  .modal-body  { padding: 18px 22px; display: flex; flex-direction: column; gap: 15px; }
  .modal-footer {
    padding: 14px 22px; border-top: 2px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end;
    background: #fff9fd; border-radius: 0 0 20px 20px;
  }

  .form-group { display: flex; flex-direction: column; gap: 6px; }

  label {
    font-size: 0.74rem; font-weight: 800;
    letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--text-muted);
    display: flex; align-items: center; gap: 5px;
  }

  input[type="text"],
  input[type="date"],
  textarea, select {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: var(--radius-xs);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem; font-weight: 500;
    padding: 9px 13px; outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    resize: vertical; width: 100%;
  }
  input[type="text"]:focus,
  input[type="date"]:focus,
  textarea:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(240,166,200,0.18);
  }
  input[type="date"] { cursor: pointer; }
  textarea { min-height: 80px; }
  select option { background: white; }

  .date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Image upload */
  .img-upload-area {
    border: 2px dashed var(--border); border-radius: var(--radius-xs);
    padding: 18px; text-align: center; cursor: pointer;
    transition: all 0.18s; background: var(--surface2);
  }
  .img-upload-area:hover { border-color: var(--accent); background: #fff5fb; }
  .img-upload-area input { display: none; }

  .img-preview { width:100%; max-height:148px; object-fit:cover; border-radius:8px; display:none; margin-bottom:10px; }
  .upload-hint { font-size:0.77rem; color: var(--text-muted); font-weight:500; }
  .upload-hint strong { color: var(--accent-dk); }

  /* Tags */
  .tags-row { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
  .tag-toggle {
    font-size: 0.71rem; font-weight: 700;
    padding: 4px 11px; border-radius: 20px;
    border: 2px solid transparent;
    cursor: pointer; transition: all 0.15s;
    letter-spacing: 0.03em; font-family: 'Nunito', sans-serif;
  }
  .tag-toggle.active { border-color: currentColor; }

  /* New tag row */
  .new-tag-row { display: flex; gap: 7px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
  .new-tag-input { flex: 1; min-width: 120px; padding: 7px 12px !important; font-size: 0.8rem !important; }
  .new-tag-colors-strip { display: flex; gap: 5px; flex-wrap: wrap; }
  .ntc {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid transparent; cursor: pointer;
    transition: all 0.13s; flex-shrink: 0;
  }
  .ntc.selected { border-color: #5c3d52; transform: scale(1.22); }

  /* Priority */
  .priority-row { display: flex; gap: 14px; }
  .priority-radio {
    display: flex; align-items: center; gap: 5px;
    font-size: 0.82rem; font-weight: 700; cursor: pointer;
    font-family:'Nunito',sans-serif; letter-spacing: 0; text-transform: none;
    color: var(--text);
  }
  .priority-radio input { accent-color: var(--accent); }

  /* Col colors */
  .col-color-row { display: flex; gap: 9px; flex-wrap: wrap; }
  .col-color-btn {
    width: 30px; height: 30px; border-radius: 50%;
    border: 2.5px solid transparent; cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  }
  .col-color-btn.selected { border-color: #5c3d52; transform: scale(1.18); }
</style>
</head>
<body>

<!-- ═══════════ HEADER ═══════════ -->
<header>
  <div class="logo">
    <div class="logo-icon">🌸</div>
    <div class="logo-text">
      <span class="logo-name">Cozy Ann</span>
      <span class="logo-sub">Kanban Board</span>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn ghost" onclick="openAddColModal()">🌸 Column</button>
    <button class="btn primary" onclick="openAddCardModal()">✿ Add Card</button>
  </div>
</header>

<!-- ═══════════ BOARD ═══════════ -->
<div class="board-wrap" id="board"></div>

<!-- ═══════════ CARD MODAL ═══════════ -->
<div class="overlay" id="card-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title"><span id="modal-icon">✿</span>&nbsp;<span id="modal-title-text">New Card</span></div>
      <button class="modal-close" onclick="closeModal('card-modal')">✕</button>
    </div>
    <div class="modal-body">

      <div class="form-group">
        <label>🌷 Card Title *</label>
        <input type="text" id="card-title-input" placeholder="What needs to be done?" />
      </div>

      <div class="form-group">
        <label>📝 Notes</label>
        <textarea id="card-note-input" placeholder="Add details, context, or any notes…"></textarea>
      </div>

      <div class="form-group">
        <label>🖼️ Image</label>
        <div class="img-upload-area" onclick="document.getElementById('img-file').click()">
          <img id="img-preview" class="img-preview" alt="preview" />
          <div id="upload-text">
            <div style="font-size:1.8rem;margin-bottom:5px">🌈</div>
            <div class="upload-hint">Click to upload &mdash; <strong>JPG, PNG, GIF, WEBP</strong></div>
            <div class="upload-hint" style="margin-top:3px;font-size:0.7rem">Max 5 MB</div>
          </div>
          <input type="file" id="img-file" accept="image/*" onchange="handleImageUpload(event)" />
        </div>
        <button class="btn ghost sm" id="remove-img-btn" style="display:none;margin-top:5px;width:100%" onclick="removeImage()">✕ Remove image</button>
      </div>

      <div class="date-row">
        <div class="form-group">
          <label>🌱 Start Date</label>
          <input type="date" id="card-start-date" />
        </div>
        <div class="form-group">
          <label>🗓️ Due Date</label>
          <input type="date" id="card-due-date" />
        </div>
      </div>

      <div class="form-group">
        <label>📌 Column</label>
        <select id="card-col-select"></select>
      </div>

      <div class="form-group">
        <label>⭐ Priority</label>
        <div class="priority-row">
          <label class="priority-radio"><input type="radio" name="priority" value="low" checked /><span style="color:#5aad88"> 🍀 Low</span></label>
          <label class="priority-radio"><input type="radio" name="priority" value="med" /><span style="color:#c4954a"> 🌼 Medium</span></label>
          <label class="priority-radio"><input type="radio" name="priority" value="high" /><span style="color:#c06070"> 🌹 High</span></label>
        </div>
      </div>

      <div class="form-group">
        <label>🏷️ Tags</label>
        <div class="tags-row" id="tags-row"></div>
        <div class="new-tag-row">
          <input class="new-tag-input" type="text" id="new-tag-input"
            placeholder="New tag name…" maxlength="20"
            onkeydown="if(event.key==='Enter'){event.preventDefault();addNewTag();}" />
          <div class="new-tag-colors-strip" id="new-tag-colors"></div>
          <button class="btn sm" onclick="addNewTag()" title="Add tag">＋ Add</button>
        </div>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('card-modal')">Cancel</button>
      <button class="btn primary" onclick="saveCard()">💾 Save Card</button>
    </div>
  </div>
</div>

<!-- ═══════════ ADD COLUMN MODAL ═══════════ -->
<div class="overlay" id="col-modal">
  <div class="modal" style="max-width:390px">
    <div class="modal-header">
      <div class="modal-title">🌸 New Column</div>
      <button class="modal-close" onclick="closeModal('col-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Column Name *</label>
        <input type="text" id="col-name-input" placeholder="e.g. Brainstorming, Blocked…" />
      </div>
      <div class="form-group">
        <label>Emoji Icon</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap" id="col-emoji-row"></div>
      </div>
      <div class="form-group">
        <label>Accent Color</label>
        <div class="col-color-row" id="col-color-row"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('col-modal')">Cancel</button>
      <button class="btn primary" onclick="addColumn()">Create ✿</button>
    </div>
  </div>
</div>

<!-- ═══════════ VIEW MODAL ═══════════ -->
<div class="overlay" id="view-modal">
  <div class="modal" style="max-width:490px">
    <div class="modal-header">
      <div class="modal-title">🌷 Card Details</div>
      <button class="modal-close" onclick="closeModal('view-modal')">✕</button>
    </div>
    <div class="modal-body" id="view-modal-body"></div>
    <div class="modal-footer">
      <button class="btn danger" onclick="deleteCardFromView()">🗑 Delete</button>
      <button class="btn" onclick="editCardFromView()">✏️ Edit</button>
      <button class="btn primary" onclick="closeModal('view-modal')">Close</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let columns = [
  { id:'todo',   name:'To Do',       color:'#e8a0bf', bg:'#fff0f7', emoji:'🌸' },
  { id:'inprog', name:'In Progress', color:'#88b4e8', bg:'#f0f5ff', emoji:'🌼' },
  { id:'review', name:'In Review',   color:'#b8a0e8', bg:'#f5f0ff', emoji:'🌙' },
  { id:'done',   name:'Done',        color:'#72c8a0', bg:'#f0fff7', emoji:'✨' },
];

let cards = [
  { id:uid(), colId:'todo',   title:'Set up project structure',  note:'Initialize repo, configure linting and folder layout.',  image:'', priority:'high', tags:['Dev'],        startDate:'2025-04-01', dueDate:'2025-04-10' },
  { id:uid(), colId:'todo',   title:'Design system tokens',      note:'Define color, typography, and spacing variables.',        image:'', priority:'med',  tags:['Design'],     startDate:'2025-04-05', dueDate:'2025-04-15' },
  { id:uid(), colId:'inprog', title:'Build auth flow',           note:'Login, signup, password reset + API integration.',       image:'', priority:'high', tags:['Dev','API'],  startDate:'2025-04-08', dueDate:'2025-04-20' },
  { id:uid(), colId:'inprog', title:'Homepage redesign',         note:'Apply new brand guidelines. Mobile-first approach.',     image:'', priority:'med',  tags:['Design'],     startDate:'2025-04-10', dueDate:'2025-04-22' },
  { id:uid(), colId:'review', title:'Write unit tests',          note:'Cover all service layer functions. Target 80%+ coverage.',image:'', priority:'low',  tags:['Dev','QA'],   startDate:'2025-04-03', dueDate:'2025-04-18' },
  { id:uid(), colId:'done',   title:'Stakeholder kickoff call',  note:'Completed. Slides shared with all attendees.',            image:'', priority:'low',  tags:['PM'],         startDate:'2025-03-25', dueDate:'2025-03-26' },
];

let TAGS = [
  { name:'Dev',       color:'#88b4e8' },
  { name:'Design',    color:'#e8a0bf' },
  { name:'QA',        color:'#72c8a0' },
  { name:'API',       color:'#e8c888' },
  { name:'PM',        color:'#b8a0e8' },
  { name:'Marketing', color:'#e8a0a0' },
  { name:'Research',  color:'#a0d4e8' },
];

const TAG_PALETTE  = ['#e8a0bf','#88b4e8','#b8a0e8','#72c8a0','#e8c888','#e8a0a0','#a0d4e8','#c8e8a0','#f0b8d0'];
const COL_COLORS   = ['#e8a0bf','#88b4e8','#b8a0e8','#72c8a0','#e8c888','#e8a0a0','#a0d4e8','#c8e8a0'];
const COL_EMOJIS   = ['🌸','🌼','🌙','✨','🌈','🍀','🌻','🦋','🎀','🍓','🌷','⭐','🎯','💡','📌'];

const priorityMap = {
  low:  { label:'Low',    color:'#5aad88', bg:'#e8f7f0', icon:'🍀' },
  med:  { label:'Medium', color:'#c4954a', bg:'#fdf4e0', icon:'🌼' },
  high: { label:'High',   color:'#c06070', bg:'#fde8ec', icon:'🌹' },
};

let editingCardId   = null;
let viewingCardId   = null;
let selectedImage   = '';
let dragCardId      = null;
let selectedColColor = COL_COLORS[0];
let selectedColEmoji = COL_EMOJIS[0];
let newTagColor     = TAG_PALETTE[0];

function uid() { return Math.random().toString(36).slice(2,10); }
function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  columns.forEach(col => board.appendChild(makeColumn(col)));
  const addBtn = document.createElement('button');
  addBtn.className = 'add-col-btn';
  addBtn.innerHTML = '🌸 Add Column';
  addBtn.onclick = openAddColModal;
  board.appendChild(addBtn);
  updateColSelects();
}

function makeColumn(col) {
  const colCards = cards.filter(c => c.colId === col.id);
  const div = document.createElement('div');
  div.className = 'column';
  div.dataset.colId = col.id;
  div.style.setProperty('--col-accent', col.color);
  div.innerHTML = `
    <div class="col-header">
      <div class="col-name-row">
        <span class="col-emoji">${col.emoji||'🌸'}</span>
        <input class="col-name-input" value="${esc(col.name)}"
          style="color:${col.color}"
          onchange="renameCol('${col.id}',this.value)"
          ondblclick="this.select()" />
        <span class="col-count">${colCards.length}</span>
      </div>
      <button class="col-del-btn" onclick="deleteColPrompt('${col.id}')" title="Delete column">✕</button>
    </div>
    <div class="col-body" id="col-body-${col.id}"></div>
    <div class="col-footer">
      <button class="add-card-btn" onclick="openAddCardModal('${col.id}')">＋ Add card</button>
    </div>
  `;
  div.addEventListener('dragover', e => { e.preventDefault(); handleDragOver(col.id, e); });
  div.addEventListener('dragleave', e => { if(!div.contains(e.relatedTarget)){ div.classList.remove('drag-over'); removePH(); } });
  div.addEventListener('drop', e => { e.preventDefault(); handleDrop(col.id); });

  const body = div.querySelector(`#col-body-${col.id}`);
  colCards.forEach(card => body.appendChild(makeCard(card)));
  return div;
}

function makeCard(card) {
  const p = priorityMap[card.priority] || priorityMap.low;
  const div = document.createElement('div');
  div.className = 'card';
  div.dataset.cardId = card.id;
  div.draggable = true;

  // Dates
  const today = new Date(); today.setHours(0,0,0,0);
  let datesHtml = '';
  if (card.startDate || card.dueDate) {
    datesHtml = '<div class="card-dates">';
    if (card.startDate) {
      datesHtml += `<span class="card-date-pill start">🌱 ${fmtDate(card.startDate)}</span>`;
    }
    if (card.dueDate) {
      const due = new Date(card.dueDate + 'T00:00:00');
      const over = card.colId !== 'done' && due < today;
      datesHtml += `<span class="card-date-pill due${over?' overdue':''}">🗓️ ${fmtDate(card.dueDate)}${over?' ⚠️':''}</span>`;
    }
    datesHtml += '</div>';
  }

  div.innerHTML = `
    ${card.image ? `<img class="card-img" src="${card.image}" alt="" />` : ''}
    <div class="card-priority" style="color:${p.color};background:${p.bg}">${p.icon} ${p.label}</div>
    <div class="card-title">${esc(card.title)}</div>
    ${card.note ? `<div class="card-note">${esc(card.note)}</div>` : ''}
    ${datesHtml}
    <div class="card-footer">
      <div class="card-tags">${card.tags.map(t=>tagPill(t)).join('')}</div>
      <div class="card-actions">
        <button class="card-action-btn" onclick="openViewModal('${card.id}')" title="View">👁</button>
        <button class="card-action-btn" onclick="openEditCard('${card.id}')" title="Edit">✏️</button>
        <button class="card-action-btn del" onclick="deleteCard('${card.id}')" title="Delete">🗑</button>
      </div>
    </div>
  `;

  div.addEventListener('dragstart', () => { dragCardId = card.id; setTimeout(()=>div.classList.add('dragging'),0); });
  div.addEventListener('dragend', () => { div.classList.remove('dragging'); removePH(); dragCardId = null; });
  div.addEventListener('click', e => { if(!e.target.closest('.card-action-btn')) openViewModal(card.id); });
  return div;
}

function tagPill(name) {
  const t = TAGS.find(x => x.name === name);
  const c = t ? t.color : '#c0b0d0';
  const dk = darken(c);
  return `<span class="tag" style="background:${c}33;color:${dk};border:1.5px solid ${c}66">${name}</span>`;
}

function darken(hex) {
  // shift each channel down for legible text on pastel background
  return '#' + (hex.replace('#','').match(/.{2}/g)||[])
    .map(h => Math.max(0, parseInt(h,16) - 68).toString(16).padStart(2,'0')).join('');
}

function fmtDate(d) {
  if (!d) return '';
  const [,m,day] = d.split('-');
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1] + ' ' + +day;
}

// ══════════════════════════════════════════════
// DRAG & DROP
// ══════════════════════════════════════════════
function handleDragOver(colId, e) {
  if (!dragCardId) return;
  document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
  document.querySelector(`.column[data-col-id="${colId}"]`).classList.add('drag-over');
  removePH();
  const body = document.getElementById(`col-body-${colId}`);
  const ph = document.createElement('div');
  ph.className = 'drop-ph'; ph.id = 'drop-ph';
  const cardEls = [...body.querySelectorAll('.card:not(.dragging)')];
  let ins = false;
  for (const c of cardEls) {
    if (e.clientY < c.getBoundingClientRect().top + c.getBoundingClientRect().height/2) {
      body.insertBefore(ph, c); ins = true; break;
    }
  }
  if (!ins) body.appendChild(ph);
}

function handleDrop(colId) {
  if (!dragCardId) return;
  const card = cards.find(c => c.id === dragCardId);
  if (card) card.colId = colId;
  document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
  removePH(); render();
}

function removePH() { const ph = document.getElementById('drop-ph'); if (ph) ph.remove(); }

// ══════════════════════════════════════════════
// MODALS
// ══════════════════════════════════════════════
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  if (id === 'card-modal') resetCardForm();
}
document.querySelectorAll('.overlay').forEach(o =>
  o.addEventListener('click', e => { if (e.target === o) closeModal(o.id); })
);

function updateColSelects() {
  const sel = document.getElementById('card-col-select');
  sel.innerHTML = columns.map(c => `<option value="${c.id}">${c.emoji} ${esc(c.name)}</option>`).join('');
}

function openAddCardModal(colId) {
  editingCardId = null; selectedImage = '';
  document.getElementById('modal-icon').textContent = '✿';
  document.getElementById('modal-title-text').textContent = 'New Card';
  document.getElementById('card-title-input').value = '';
  document.getElementById('card-note-input').value = '';
  document.getElementById('card-start-date').value = '';
  document.getElementById('card-due-date').value = '';
  resetImgPreview();
  if (colId) document.getElementById('card-col-select').value = colId;
  document.querySelector('input[name="priority"][value="low"]').checked = true;
  renderTagToggles([]);
  renderNewTagColors();
  openModal('card-modal');
}

function openEditCard(cardId) {
  closeModal('view-modal');
  const card = cards.find(c => c.id === cardId);
  if (!card) return;
  editingCardId = cardId; selectedImage = card.image || '';
  document.getElementById('modal-icon').textContent = '✏️';
  document.getElementById('modal-title-text').textContent = 'Edit Card';
  document.getElementById('card-title-input').value = card.title;
  document.getElementById('card-note-input').value = card.note;
  document.getElementById('card-start-date').value = card.startDate || '';
  document.getElementById('card-due-date').value = card.dueDate || '';
  document.getElementById('card-col-select').value = card.colId;
  document.querySelectorAll('input[name="priority"]').forEach(r => r.checked = r.value === card.priority);
  if (card.image) {
    document.getElementById('img-preview').src = card.image;
    document.getElementById('img-preview').style.display = 'block';
    document.getElementById('upload-text').style.display = 'none';
    document.getElementById('remove-img-btn').style.display = '';
  } else resetImgPreview();
  renderTagToggles(card.tags);
  renderNewTagColors();
  openModal('card-modal');
}

function saveCard() {
  const title = document.getElementById('card-title-input').value.trim();
  if (!title) { document.getElementById('card-title-input').focus(); return; }
  const note      = document.getElementById('card-note-input').value.trim();
  const colId     = document.getElementById('card-col-select').value;
  const priority  = document.querySelector('input[name="priority"]:checked').value;
  const tags      = [...document.querySelectorAll('.tag-toggle.active')].map(b => b.dataset.tag);
  const startDate = document.getElementById('card-start-date').value;
  const dueDate   = document.getElementById('card-due-date').value;

  if (editingCardId) {
    const card = cards.find(c => c.id === editingCardId);
    Object.assign(card, { title, note, colId, priority, tags, image: selectedImage, startDate, dueDate });
  } else {
    cards.push({ id:uid(), colId, title, note, priority, tags, image: selectedImage, startDate, dueDate });
  }
  closeModal('card-modal'); render();
}

function resetCardForm() { editingCardId = null; selectedImage = ''; resetImgPreview(); }

function deleteCard(id) { cards = cards.filter(c => c.id !== id); render(); }

// ── Image ────────────────────────────────────────────────────
function handleImageUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  if (file.size > 5*1024*1024) { alert('Image must be under 5 MB 🌸'); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    selectedImage = ev.target.result;
    document.getElementById('img-preview').src = selectedImage;
    document.getElementById('img-preview').style.display = 'block';
    document.getElementById('upload-text').style.display = 'none';
    document.getElementById('remove-img-btn').style.display = '';
  };
  reader.readAsDataURL(file);
}

function removeImage() {
  selectedImage = '';
  resetImgPreview();
  document.getElementById('img-file').value = '';
}

function resetImgPreview() {
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('img-preview').src = '';
  document.getElementById('upload-text').style.display = '';
  document.getElementById('remove-img-btn').style.display = 'none';
}

// ── Tags ─────────────────────────────────────────────────────
function renderTagToggles(active) {
  const row = document.getElementById('tags-row');
  row.innerHTML = '';
  TAGS.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'tag-toggle' + (active.includes(tag.name) ? ' active' : '');
    btn.dataset.tag = tag.name;
    btn.textContent = tag.name;
    const dk = darken(tag.color);
    btn.style.color = dk;
    btn.style.background = active.includes(tag.name) ? tag.color + '33' : 'transparent';
    btn.onclick = () => {
      btn.classList.toggle('active');
      btn.style.background = btn.classList.contains('active') ? tag.color + '33' : 'transparent';
    };
    row.appendChild(btn);
  });
}

function renderNewTagColors() {
  const strip = document.getElementById('new-tag-colors');
  strip.innerHTML = '';
  TAG_PALETTE.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'ntc' + (c === newTagColor ? ' selected' : '');
    btn.style.background = c;
    btn.title = c;
    btn.onclick = () => { newTagColor = c; renderNewTagColors(); };
    strip.appendChild(btn);
  });
}

function addNewTag() {
  const input = document.getElementById('new-tag-input');
  const name = input.value.trim();
  if (!name) return;
  if (TAGS.find(t => t.name.toLowerCase() === name.toLowerCase())) {
    input.value = ''; return;
  }
  TAGS.push({ name, color: newTagColor });
  input.value = '';
  const active = [...document.querySelectorAll('.tag-toggle.active')].map(b => b.dataset.tag);
  active.push(name);
  renderTagToggles(active);
}

// ── View Modal ───────────────────────────────────────────────
function openViewModal(cardId) {
  viewingCardId = cardId;
  const card = cards.find(c => c.id === cardId); if (!card) return;
  const col = columns.find(c => c.id === card.colId);
  const p = priorityMap[card.priority] || priorityMap.low;
  const today = new Date(); today.setHours(0,0,0,0);

  let datesHtml = '';
  if (card.startDate || card.dueDate) {
    datesHtml = '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">';
    if (card.startDate) datesHtml += `<span class="card-date-pill start">🌱 Start: ${fmtDate(card.startDate)}</span>`;
    if (card.dueDate) {
      const due = new Date(card.dueDate + 'T00:00:00');
      const over = card.colId !== 'done' && due < today;
      datesHtml += `<span class="card-date-pill due${over?' overdue':''}">🗓️ Due: ${fmtDate(card.dueDate)}${over?' ⚠️':''}</span>`;
    }
    datesHtml += '</div>';
  }

  document.getElementById('view-modal-body').innerHTML = `
    ${card.image ? `<img src="${card.image}" style="width:100%;max-height:200px;object-fit:cover;border-radius:10px;margin-bottom:14px;border:2px solid var(--border)" />` : ''}
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <span style="font-size:0.72rem;font-weight:800;padding:3px 11px;border-radius:20px;color:${p.color};background:${p.bg}">${p.icon} ${p.label}</span>
      <span style="font-size:0.72rem;font-weight:700;padding:3px 11px;border-radius:20px;background:${col?.color||'#eee'}33;color:${darken(col?.color||'#bbb')}">${col?.emoji||''} ${esc(col?.name||'')}</span>
      ${card.tags.map(t=>tagPill(t)).join('')}
    </div>
    <div style="font-family:'Quicksand',sans-serif;font-weight:700;font-size:1.08rem;margin-bottom:12px;color:var(--text)">${esc(card.title)}</div>
    ${datesHtml}
    ${card.note
      ? `<div style="font-size:0.84rem;line-height:1.65;color:var(--text-muted);white-space:pre-wrap">${esc(card.note)}</div>`
      : '<div style="font-size:0.8rem;color:var(--text-muted);font-style:italic">No notes added yet 🌱</div>'}
  `;
  openModal('view-modal');
}

function deleteCardFromView() { if (viewingCardId) { deleteCard(viewingCardId); closeModal('view-modal'); } }
function editCardFromView()   { if (viewingCardId) openEditCard(viewingCardId); }

// ── Columns ──────────────────────────────────────────────────
function renameCol(colId, name) {
  const col = columns.find(c => c.id === colId);
  if (col) { col.name = name; render(); }
}

function deleteColPrompt(colId) {
  const col   = columns.find(c => c.id === colId);
  const count = cards.filter(c => c.colId === colId).length;
  const msg   = count > 0
    ? `Delete "${col.name}"? This will also remove ${count} card(s) 🌸`
    : `Delete column "${col.name}"? 🌸`;
  if (confirm(msg)) {
    cards   = cards.filter(c => c.colId !== colId);
    columns = columns.filter(c => c.id !== colId);
    render();
  }
}

function openAddColModal() {
  document.getElementById('col-name-input').value = '';
  selectedColColor = COL_COLORS[0];
  selectedColEmoji = COL_EMOJIS[0];
  renderColColors(); renderColEmojis();
  openModal('col-modal');
}

function renderColColors() {
  const row = document.getElementById('col-color-row');
  row.innerHTML = '';
  COL_COLORS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'col-color-btn' + (c === selectedColColor ? ' selected' : '');
    btn.style.background = c;
    btn.onclick = () => { selectedColColor = c; renderColColors(); };
    row.appendChild(btn);
  });
}

function renderColEmojis() {
  const row = document.getElementById('col-emoji-row');
  row.innerHTML = '';
  COL_EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.textContent = e;
    const sel = e === selectedColEmoji;
    btn.style.cssText = `font-size:1.25rem;background:${sel?'var(--surface3)':'transparent'};border:2px solid ${sel?'var(--border)':'transparent'};border-radius:8px;padding:3px 6px;cursor:pointer;transition:all 0.13s`;
    btn.onclick = () => { selectedColEmoji = e; renderColEmojis(); };
    row.appendChild(btn);
  });
}

function addColumn() {
  const name = document.getElementById('col-name-input').value.trim();
  if (!name) { document.getElementById('col-name-input').focus(); return; }
  columns.push({ id:uid(), name, color:selectedColColor, bg:selectedColColor+'20', emoji:selectedColEmoji });
  closeModal('col-modal'); render();
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
render();
renderNewTagColors();
renderColColors();
renderColEmojis();
</script>
</body>
</html>
